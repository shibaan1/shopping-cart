<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="header">
        <div id="logo">SHOPPING HUB</div>
        <input type="text" id="search-input" placeholder="search products...">
        <button id="cart-btn">
            🛒
            <span class="cart-count">
                0
            </span>
        </button>
    </header>

    <main id="main">
        <section id="filter">
            <button class="filter-btn" data-category="all">All</button>
            <button class="filter-btn" data-category="men's clothing">Men's Clothing</button>
            <button class="filter-btn" data-category="women's clothing">Women's Clothing</button>
            <button class="filter-btn" data-category="electronics">Electronics</button>
            <button class="filter-btn" data-category="jewelery">Jewelery</button>
        </section>

        <div class="product-grid" id="products-container">

        </div>
    </main>

    <section id="cart-modal">
        <div class="modal-content">
            <header>
                <button id="close">CLOSE</button>

            </header>

            <ul id="cart-item-list"></ul>
            <p id="empty-cart-msg">Your cart is empty</p>
            <input type="text" placeholder="discount code">

            <div id="total"></div>
            <button id="checkout">Checkout</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
